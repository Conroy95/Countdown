<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        body {
            background-color: white;
            color: red;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Voorkomt scrollen */
        }
        .container {
            width: 90%;
            text-align: center;
        }
        .count {
            /* Responsive lettergrootte: past zich aan schermbreedte aan */
            font-size: 25vw; 
            font-weight: 900;
            line-height: 0.8;
            margin: 0;
        }
        .label {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        /* Voor grotere schermen de tekst beperken */
        @media (min-width: 768px) {
            .count { font-size: 15rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="count" id="days">0</div>
        <div class="label">Werkdagen te gaan</div>
    </div>

    <script>
        function calculate() {
            // Deadline: 27 juni 2026
            const target = new Date(2026, 5, 27); 
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Jouw vrije dagen (Mei = maand 4, Juni = maand 5)
            const freeDays = [
                new Date(2026, 4, 14).getTime(),
                new Date(2026, 4, 15).getTime(),
                new Date(2026, 4, 25).getTime(),
                new Date(2026, 5, 5).getTime(),
                new Date(2026, 5, 12).getTime(),
                new Date(2026, 5, 19).getTime(),
                new Date(2026, 5, 26).getTime()
            ];

            let count = 0;
            let current = new Date(today);

            while (current < target) {
                const dayOfWeek = current.getDay(); 
                const currentTime = current.getTime();

                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isFreeDay = freeDays.includes(currentTime);

                if (!isWeekend && !isFreeDay) {
                    count++;
                }
                current.setDate(current.getDate() + 1);
            }
            return count;
        }

        document.getElementById('days').innerText = calculate();
    </script>

</body>
</html>
