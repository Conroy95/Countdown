<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        body {
            background-color: white;
            color: red;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .count { font-size: 8rem; font-weight: bold; line-height: 1; }
        .label { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
    </style>
</head>
<body>

    <div>
        <div class="count" id="days">0</div>
        <div class="label">Werkdagen te gaan</div>
    </div>

    <script>
        function calculate() {
            const target = new Date(2026, 5, 27); // 27 juni 2026
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Jouw vrije dagen (maand is 0-gebaseerd, dus mei=4, juni=5)
            const freeDays = [
                new Date(2026, 4, 14).getTime(), // 14 mei
                new Date(2026, 4, 15).getTime(), // 15 mei
                new Date(2026, 4, 25).getTime(), // 25 mei
                new Date(2026, 5, 5).getTime(),  // 5 juni
                new Date(2026, 5, 12).getTime(), // 12 juni
                new Date(2026, 5, 19).getTime(), // 19 juni
                new Date(2026, 5, 26).getTime()  // 26 juni
            ];

            let count = 0;
            let current = new Date(today);

            while (current < target) {
                const dayOfWeek = current.getDay(); 
                const currentTime = current.getTime();

                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isFreeDay = freeDays.includes(currentTime);

                if (!isWeekend && !isFreeDay) {
                    count++;
                }
                current.setDate(current.getDate() + 1);
            }
            return count;
        }

        document.getElementById('days').innerText = calculate();
    </script>

</body>
</html>
