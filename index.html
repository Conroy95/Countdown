<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        body {
            background-color: #ffffff;
            color: #ff0000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .days {
            font-size: 6rem;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }
        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div>
    <p class="days" id="count">0</p>
    <p class="label">Werkdagen tot 27 juni 2026</p>
</div>

<script>
    function calculate() {
        const target = new Date('2026-06-27');
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const exclude = [
            '2026-05-14', '2026-05-15', '2026-05-25',
            '2026-06-05', '2026-06-12', '2026-06-19', '2026-06-26'
        ];

        let total = 0;
        let d = new Date(today);

        while (d < target) {
            const dayOfWeek = d.getDay();
            const dateStr = d.toISOString().split('T')[0];
            
            // Check: geen zondag (0), geen zaterdag (6) en niet in de lijst met vrije dagen
            if (dayOfWeek !== 0 && dayOfWeek !== 6 && !exclude.includes(dateStr)) {
                total++;
            }
            d.setDate(d.getDate() + 1);
        }
        return total;
    }
    document.getElementById('count').innerText = calculate();
</script>

</body>
</html>
