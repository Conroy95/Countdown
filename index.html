<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Widget</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="countdown-list">
        <div class="countdown-item">
            <span class="title">Vakantie in mei</span>
            <span class="count" id="vrij-mei">0</span>
        </div>
        
        <div class="countdown-item">
            <span class="title">Kerstvakantie</span>
            <span class="count" id="kerst">0</span>
        </div>

        <div class="countdown-item">
            <span class="title">Zomervakantie</span>
            <span class="count" id="zomer">0</span>
        </div>

        <div class="countdown-item">
            <span class="title">Weekend!</span>
            <span class="count" id="weekend">0</span>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
