<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        body {
            background-color: white;
            color: red;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .count { font-size: 8rem; font-weight: bold; line-height: 1; }
        .label { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
    </style>
</head>
<body>

    <div>
        <div class="count" id="days">0</div>
        <div class="label">Werkdagen te gaan</div>
    </div>

    <script>
        function calculate() {
            const target = new Date('2026-06-27');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const freeDays = [
                '2026-05-14', '2026-05-15', '2026-05-25',
                '2026-06-05', '2026-06-12', '2026-06-19', '2026-06-26'
            ];

            let count = 0;
            let current = new Date(today); // Start bij vandaag

            while (current < target) {
                const dayOfWeek = current.getDay(); 
                const dateStr = current.toISOString().split('T')[0];

                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isFreeDay = freeDays.includes(dateStr);

                if (!isWeekend && !isFreeDay) {
                    count++;
                }
                current.setDate(current.getDate() + 1);
            }
            return count;
        }

        document.getElementById('days').innerText = calculate();
    </script>

</body>
</html>
