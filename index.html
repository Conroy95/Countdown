<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Countdowns</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <ul class="countdown-list">
            <li class="countdown-item">
                <span class="title">Vakantie in mei</span>
                <span class="count" id="vrij-mei">0</span>
            </li>
            <li class="countdown-item">
                <span class="title">Kerstvakantie</span>
                <span class="count" id="kerst">0</span>
            </li>
            <li class="countdown-item">
                <span class="title">Zomervakantie 2026</span>
                <span class="count" id="zomer">0</span>
            </li>
        </ul>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
